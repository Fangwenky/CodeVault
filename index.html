<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💾 CodeVault - 程序员代码片段库</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Fira Code', 'Consolas', monospace; background: #1e1e1e; color: #d4d4d4; min-height: 100vh; }
        
        header { background: linear-gradient(135deg, #0e639c 0%, #1177bb 100%); padding: 20px; text-align: center; }
        header h1 { font-size: 1.8rem; margin-bottom: 5px; }
        
        .container { display: flex; height: calc(100vh - 70px); }
        
        /* Sidebar */
        .sidebar { width: 280px; background: #252526; border-right: 1px solid #3c3c3c; overflow-y: auto; padding: 10px; }
        .sidebar h3 { color: #cccccc; padding: 10px; font-size: 0.85rem; text-transform: uppercase; }
        
        .folder { padding: 8px 10px; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 8px; }
        .folder:hover { background: #2a2d2e; }
        .folder.active { background: #37373d; }
        
        .snippet { padding: 8px 10px; cursor: pointer; border-radius: 4px; margin-left: 20px; font-size: 0.9rem; }
        .snippet:hover { background: #2a2d2e; }
        .snippet.active { background: #37373d; }
        
        /* Main */
        .main { flex: 1; display: flex; flex-direction: column; }
        
        /* Toolbar */
        .toolbar { background: #2d2d2d; padding: 10px 20px; display: flex; gap: 10px; border-bottom: 1px solid #3c3c3c; }
        .btn { background: #0e639c; border: none; padding: 8px 16px; border-radius: 4px; color: white; cursor: pointer; font-size: 0.85rem; }
        .btn:hover { background: #1177bb; }
        .btn.secondary { background: #3c3c3c; }
        
        /* Editor */
        .editor { flex: 1; display: flex; flex-direction: column; }
        .editor-header { background: #2d2d2d; padding: 10px 20px; border-bottom: 1px solid #3c3c3c; }
        .editor-header input { background: transparent; border: none; color: #d4d4d4; font-size: 1.2rem; width: 100%; }
        .editor-header input:focus { outline: none; }
        
        .code-area { flex: 1; display: flex; }
        .line-numbers { background: #1e1e1e; padding: 15px 10px; text-align: right; color: #858585; user-select: none; border-right: 1px solid #3c3c3c; min-width: 50px; }
        .code-input { flex: 1; background: #1e1e1e; border: none; padding: 15px; color: #d4d4d4; font-family: 'Fira Code', monospace; font-size: 14px; line-height: 1.5; resize: none; }
        .code-input:focus { outline: none; }
        
        /* Info */
        .info-panel { background: #252526; padding: 15px; border-top: 1px solid #3c3c3c; display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .info-item label { display: block; color: #858585; font-size: 0.75rem; margin-bottom: 5px; }
        .info-item select, .info-item input { background: #3c3c3c; border: 1px solid #3c3c3c; padding: 6px; border-radius: 4px; color: #d4d4d4; width: 100%; }
        
        /* Search */
        .search-bar { padding: 10px; border-bottom: 1px solid #3c3c3c; }
        .search-bar input { width: 100%; background: #3c3c3c; border: none; padding: 8px 12px; border-radius: 4px; color: #d4d4d4; }
        
        /* Tags */
        .tag { display: inline-block; background: #0e639c; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; margin-right: 5px; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; }
        .modal.show { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: #252526; border: 1px solid #3c3c3c; border-radius: 8px; padding: 25px; width: 400px; }
        .modal-content h3 { margin-bottom: 15px; }
        .modal-content input, .modal-content select { width: 100%; background: #3c3c3c; border: none; padding: 10px; border-radius: 4px; color: #d4d4d4; margin-bottom: 15px; }
        
        /* Copy button */
        .copy-btn { position: absolute; top: 10px; right: 10px; background: #0e639c; border: none; padding: 5px 10px; border-radius: 4px; color: white; cursor: pointer; font-size: 0.8rem; }
        
        /* Empty */
        .empty { padding: 40px; text-align: center; color: #858585; }
        
        /* Language colors */
        .lang-python { color: #3572A5; }
        .lang-javascript { color: #f1e05a; }
        .lang-html { color: #e34c26; }
        .lang-css { color: #563d7c; }
        .lang-java { color: #b07219; }
        .lang-go { color: #00ADD8; }
        .lang-rust { color: #dea584; }
        .lang-cpp { color: #f34b7d; }
        
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; height: 200px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>💾 CodeVault</h1>
        <p>程序员代码片段库</p>
    </header>
    
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 搜索代码..." oninput="renderSnippets()">
            </div>
            
            <h3>📁 文件夹</h3>
            <div id="folderList"></div>
            
            <h3 style="margin-top:20px">📝 代码片段</h3>
            <div id="snippetList"></div>
        </div>
        
        <!-- Main -->
        <div class="main">
            <div class="toolbar">
                <button class="btn" onclick="showNewFolderModal()">➕ 新建文件夹</button>
                <button class="btn" onclick="showNewSnippetModal()">➕ 新建代码</button>
                <button class="btn secondary" onclick="saveCurrent()">💾 保存</button>
                <button class="btn secondary" onclick="copyCode()">📋 复制</button>
                <button class="btn secondary" onclick="deleteCurrent()">🗑️ 删除</button>
            </div>
            
            <div class="editor">
                <div class="editor-header">
                    <input type="text" id="snippetTitle" placeholder="代码标题...">
                </div>
                
                <div class="code-area" style="position:relative">
                    <div class="line-numbers" id="lineNumbers">1</div>
                    <textarea class="code-input" id="codeEditor" placeholder="在这里输入代码..." oninput="updateLineNumbers()"></textarea>
                    <button class="copy-btn" onclick="copyCode()">复制</button>
                </div>
            </div>
            
            <div class="info-panel">
                <div class="info-item">
                    <label>语言</label>
                    <select id="codeLanguage">
                        <option value="python">Python</option>
                        <option value="javascript">JavaScript</option>
                        <option value="html">HTML</option>
                        <option value="css">CSS</option>
                        <option value="java">Java</option>
                        <option value="go">Go</option>
                        <option value="rust">Rust</option>
                        <option value="cpp">C++</option>
                        <option value="csharp">C#</option>
                        <option value="typescript">TypeScript</option>
                        <option value="sql">SQL</option>
                        <option value="bash">Bash</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="info-item">
                    <label>描述</label>
                    <input type="text" id="snippetDesc" placeholder="简短描述...">
                </div>
                <div class="info-item">
                    <label>标签</label>
                    <input type="text" id="snippetTags" placeholder="逗号分隔">
                </div>
                <div class="info-item">
                    <label>文件夹</label>
                    <select id="snippetFolder">
                        <option value="">无</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
    
    <!-- New Folder Modal -->
    <div id="folderModal" class="modal">
        <div class="modal-content">
            <h3>📁 新建文件夹</h3>
            <input type="text" id="newFolderName" placeholder="文件夹名称">
            <button class="btn" onclick="createFolder()">创建</button>
            <button class="btn secondary" onclick="closeModal('folderModal')">取消</button>
        </div>
    </div>
    
    <!-- New Snippet Modal -->
    <div id="snippetModal" class="modal">
        <div class="modal-content">
            <h3>➕ 新建代码片段</h3>
            <input type="text" id="newSnippetTitle" placeholder="代码标题">
            <select id="newSnippetLang">
                <option value="python">Python</option>
                <option value="javascript">JavaScript</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="java">Java</option>
                <option value="go">Go</option>
                <option value="other">Other</option>
            </select>
            <button class="btn" onclick="createSnippet()">创建</button>
            <button class="btn secondary" onclick="closeModal('snippetModal')">取消</button>
        </div>
    </div>
    
    <script>
        // Data
        let data = JSON.parse(localStorage.getItem('codevault') || '{"folders":[],"snippets":[],"current":null}');
        let currentFolder = null;
        
        // Init
        renderFolders();
        renderSnippets();
        updateFolderSelect();
        
        function saveData() {
            localStorage.setItem('codevault', JSON.stringify(data));
        }
        
        // Render folders
        function renderFolders() {
            const list = document.getElementById('folderList');
            if (!data.folders.length) {
                list.innerHTML = '<div class="snippet">📁 全部代码</div>';
                return;
            }
            
            list.innerHTML = data.folders.map(f => `
                <div class="folder ${currentFolder === f.name ? 'active' : ''}" onclick="selectFolder('${f.name}')">
                    📁 ${f.name}
                </div>
            `).join('') + '<div class="folder" onclick="selectFolder(null)">📁 全部代码</div>';
        }
        
        function selectFolder(name) {
            currentFolder = name;
            renderFolders();
            renderSnippets();
        }
        
        // Render snippets
        function renderSnippets() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            let snippets = data.snippets;
            
            // Filter by folder
            if (currentFolder) {
                snippets = snippets.filter(s => s.folder === currentFolder);
            }
            
            // Filter by search
            if (search) {
                snippets = snippets.filter(s => 
                    s.title.toLowerCase().includes(search) ||
                    s.code.toLowerCase().includes(search) ||
                    (s.tags || []).some(t => t.toLowerCase().includes(search))
                );
            }
            
            const list = document.getElementById('snippetList');
            if (!snippets.length) {
                list.innerHTML = '<div class="empty">暂无代码</div>';
                return;
            }
            
            list.innerHTML = snippets.map((s, i) => `
                <div class="snippet ${data.current === s.id ? 'active' : ''}" onclick="loadSnippet(${i})">
                    <span class="lang-${s.language}">${getLangIcon(s.language)}</span>
                    ${s.title}
                </div>
            `).join('');
        }
        
        function getLangIcon(lang) {
            const icons = { python: '🐍', javascript: '📜', html: '🌐', css: '🎨', java: '☕', go: '🐹', rust: '🦀', cpp: '⚡' };
            return icons[lang] || '📄';
        }
        
        // Load snippet
        function loadSnippet(index) {
            let snippets = data.snippets;
            if (currentFolder) snippets = snippets.filter(s => s.folder === currentFolder);
            const search = document.getElementById('searchInput').value.toLowerCase();
            if (search) snippets = snippets.filter(s => s.title.toLowerCase().includes(search) || s.code.toLowerCase().includes(search));
            
            const s = snippets[index];
            if (!s) return;
            
            data.current = s.id;
            document.getElementById('snippetTitle').value = s.title;
            document.getElementById('codeEditor').value = s.code;
            document.getElementById('codeLanguage').value = s.language;
            document.getElementById('snippetDesc').value = s.description || '';
            document.getElementById('snippetTags').value = (s.tags || []).join(', ');
            document.getElementById('snippetFolder').value = s.folder || '';
            
            updateLineNumbers();
            renderSnippets();
            saveData();
        }
        
        // Save current
        function saveCurrent() {
            if (!data.current) {
                alert('请先选择一个代码片段');
                return;
            }
            
            const s = data.snippets.find(s => s.id === data.current);
            if (s) {
                s.title = document.getElementById('snippetTitle').value;
                s.code = document.getElementById('codeEditor').value;
                s.language = document.getElementById('codeLanguage').value;
                s.description = document.getElementById('snippetDesc').value;
                s.tags = document.getElementById('snippetTags').value.split(',').map(t => t.trim()).filter(t => t);
                s.folder = document.getElementById('snippetFolder').value || null;
                s.updated = new Date().toISOString();
                
                saveData();
                renderSnippets();
                alert('✅ 已保存');
            }
        }
        
        // Delete current
        function deleteCurrent() {
            if (!data.current) return;
            if (!confirm('确定删除这个代码片段？')) return;
            
            data.snippets = data.snippets.filter(s => s.id !== data.current);
            data.current = null;
            
            document.getElementById('snippetTitle').value = '';
            document.getElementById('codeEditor').value = '';
            document.getElementById('snippetDesc').value = '';
            document.getElementById('snippetTags').value = '';
            
            saveData();
            renderSnippets();
        }
        
        // Copy code
        function copyCode() {
            const code = document.getElementById('codeEditor').value;
            navigator.clipboard.writeText(code).then(() => {
                alert('📋 已复制到剪贴板');
            });
        }
        
        // Line numbers
        function updateLineNumbers() {
            const code = document.getElementById('codeEditor').value;
            const lines = code.split('\n').length;
            const numbers = Array.from({ length: lines }, (_, i) => i + 1).join('\n');
            document.getElementById('lineNumbers').textContent = numbers;
        }
        
        // Folder management
        function showNewFolderModal() {
            document.getElementById('folderModal').classList.add('show');
        }
        
        function createFolder() {
            const name = document.getElementById('newFolderName').value.trim();
            if (!name) return;
            
            if (!data.folders.includes(name)) {
                data.folders.push(name);
                saveData();
                renderFolders();
                updateFolderSelect();
            }
            
            closeModal('folderModal');
            document.getElementById('newFolderName').value = '';
        }
        
        function updateFolderSelect() {
            const select = document.getElementById('snippetFolder');
            select.innerHTML = '<option value="">无</option>' + 
                data.folders.map(f => `<option value="${f}">📁 ${f}</option>`).join('');
        }
        
        // Snippet management
        function showNewSnippetModal() {
            document.getElementById('snippetModal').classList.add('show');
        }
        
        function createSnippet() {
            const title = document.getElementById('newSnippetTitle').value.trim();
            const lang = document.getElementById('newSnippetLang').value;
            
            if (!title) return;
            
            const snippet = {
                id: Date.now(),
                title,
                language: lang,
                code: '',
                description: '',
                tags: [],
                folder: currentFolder,
                created: new Date().toISOString()
            };
            
            data.snippets.unshift(snippet);
            data.current = snippet.id;
            
            saveData();
            renderSnippets();
            loadSnippet(0);
            closeModal('snippetModal');
            document.getElementById('newSnippetTitle').value = '';
        }
        
        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveCurrent();
            }
        });
    </script>
</body>
</html>
